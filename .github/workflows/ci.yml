name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          UPSTASH_REDIS_REST_URL: https://fake.upstash.io
          UPSTASH_REDIS_REST_TOKEN: fake
          AUTH_SECRET: fake
          AUTH_URL: http://localhost:3000
